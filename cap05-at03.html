<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AT03 — Formulário de Matrícula Acadêmica</title>
</head>

<body>

    <main>

        <h1>Formulário de Matrícula Acadêmica</h1>

        <p>* Campos obrigatórios</p>

        <form action="https://httpbin.org/post" method="post">

            <fieldset>

                <legend>Dados Pessoais</legend>

                <label for="nome">Nome completo *</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    required
                    minlength="5"
                    maxlength="100">

                <br><br>

                <label for="cpf">CPF *</label>
                <input
                    type="text"
                    id="cpf"
                    name="cpf"
                    required
                    pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                    placeholder="000.000.000-00"
                    title="CPF no formato 000.000.000-00">

                <br><br>

                <label for="telefone">Telefone</label>
                <input
                    type="tel"
                    id="telefone"
                    name="telefone"
                    pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
                    placeholder="(82) 99999-9999">

                <br><br>

                <label for="email">E-mail *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required>

            </fieldset>

            <br>

            <fieldset>

                <legend>Dados Acadêmicos</legend>

                <label for="curso">Curso *</label>

                <select id="curso" name="curso" required>

                    <option value="">Selecione</option>

                    <optgroup label="Computação">
                        <option>Sistemas de Informação</option>
                        <option>Ciência da Computação</option>
                        <option>Engenharia da Computação</option>
                    </optgroup>

                    <optgroup label="Gestão">
                        <option>Administração</option>
                        <option>Ciências Contábeis</option>
                    </optgroup>

                </select>

                <br><br>

                <fieldset>

                    <legend>Período *</legend>

                    <input
                        type="radio"
                        id="manha"
                        name="periodo"
                        value="manha">

                    <label for="manha">Manhã</label>

                    <br>

                    <input
                        type="radio"
                        id="tarde"
                        name="periodo"
                        value="tarde">

                    <label for="tarde">Tarde</label>

                    <br>

                    <input
                        type="radio"
                        id="noite"
                        name="periodo"
                        value="noite">

                    <label for="noite">Noite</label>

                </fieldset>

                <br>

                <label for="ano_ingresso">Ano de ingresso pretendido *</label>

                <input
                    type="number"
                    id="ano_ingresso"
                    name="ano_ingresso"
                    min="2025"
                    max="2030"
                    required>

            </fieldset>

            <br>

            <fieldset>

                <legend>Áreas de Interesse</legend>

                <input
                    type="checkbox"
                    id="web"
                    name="interesses[]"
                    value="Desenvolvimento Web">

                <label for="web">Desenvolvimento Web</label>

                <br>

                <input
                    type="checkbox"
                    id="bd"
                    name="interesses[]"
                    value="Banco de Dados">

                <label for="bd">Banco de Dados</label>

                <br>

                <input
                    type="checkbox"
                    id="ia"
                    name="interesses[]"
                    value="Inteligência Artificial">

                <label for="ia">Inteligência Artificial</label>

                <br>

                <input
                    type="checkbox"
                    id="seguranca"
                    name="interesses[]"
                    value="Segurança da Informação">

                <label for="seguranca">Segurança da Informação</label>

                <br>

                <input
                    type="checkbox"
                    id="infraestrutura"
                    name="interesses[]"
                    value="Infraestrutura">

                <label for="infraestrutura">Infraestrutura</label>

            </fieldset>

            <br>

            <button type="submit">Solicitar matrícula</button>

            <button type="reset">Limpar formulário</button>

        </form>

    </main>
   <p>
        <a href="index.html">← Voltar à página principal</a>
    </p>

</body>
</html>
