<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Semana de Tecnologia IFAL</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        form { display: flex; flex-direction: column; gap: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { padding: 10px; font-size: 16px; }
        .campo { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Inscrição - Semana de Tecnologia IFAL</h1>
    
    <form method="post" action="https://httpbin.org/post" enctype="multipart/form-data">
        
        <!-- Identificação do participante -->
        <fieldset>
            <legend>Identificação do participante</legend>
            
            <div class="campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            
            <div class="campo">
                <label for="email">E-mail institucional</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="campo">
                <label for="cidade">Cidade de origem</label>
                <input list="cidades" type="text" id="cidade" name="cidade">
                <datalist id="cidades">
                    <option value="Maceió"></option>
                    <option value="Arapiraca"></option>
                    <option value="Palmeira dos Índios"></option>
                    <option value="Rio Largo"></option>
                    <option value="Penedo"></option>
                    <option value="União dos Palmares"></option>
                    <option value="São Miguel dos Campos"></option>
                    <option value="Delmiro Gouveia"></option>
                    <option value="Coruripe"></option>
                    <option value="Santana do Ipanema"></option>
                </datalist>
            </div>
            
            <div class="campo">
                <label for="foto">Foto para crachá</label>
                <input type="file" id="foto" name="foto" accept="image/jpeg, image/png">
                <small id="foto-desc">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
            </div>
        </fieldset>
        
        <!-- Preferências para o evento -->
        <fieldset>
            <legend>Preferências para o evento</legend>
            
            <div class="campo">
                <label for="chegada">Data e hora preferida para chegada</label>
                <input type="datetime-local" id="chegada" name="chegada">
            </div>
            
            <div class="campo">
                <label for="experiencia">
                    Nível de experiência em programação 
                    <span id="valor-experiencia">5</span>/10
                </label>
                <input 
                    type="range" 
                    id="experiencia" 
                    name="experiencia" 
                    min="0" 
                    max="10" 
                    step="1" 
                    value="5"
                    oninput="document.getElementById('valor-experiencia').textContent = this.value">
            </div>
            
            <div class="campo">
                <label for="cor_camiseta">Cor de preferência para a camiseta</label>
                <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8">
            </div>
            
            <div class="campo">
                <label for="oficinas">Oficinas de interesse</label>
                <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="oficinas-desc">
                    <option value="web">Desenvolvimento Web</option>
                    <option value="mobile">Desenvolvimento Mobile</option>
                    <option value="python">Python para Dados</option>
                    <option value="ia">Inteligência Artificial</option>
                    <option value="seguranca">Segurança da Informação</option>
                    <option value="devops">DevOps e Cloud</option>
                </select>
                <small id="oficinas-desc">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
            </div>
        </fieldset>
        
        <!-- Campo oculto -->
        <input type="hidden" name="edicao" value="2026">
        
        <button type="submit">Confirmar inscrição</button>
    </form>
   <p>
        <a href="index.html">← Voltar à página principal</a>
    </p>

</body>
</html>
