<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AT02 — Cadastro de Usuário</title>
</head>

<body>

    <main>

        <h1>Cadastro de Usuário</h1>

        <form action="https://httpbin.org/post" method="post">

            <label for="nome">Nome completo</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                minlength="3">

            <br><br>

            <label for="email">E-mail</label>
            <input
                type="email"
                id="email"
                name="email"
                required>

            <br><br>

            <label for="senha">Senha</label>
            <input
                type="password"
                id="senha"
                name="senha"
                required
                minlength="8">

            <br><br>

            <label for="nascimento">Data de nascimento</label>
            <input
                type="date"
                id="nascimento"
                name="nascimento"
                required>

            <br><br>

            <fieldset>

                <legend>Gênero</legend>

                <input
                    type="radio"
                    id="masculino"
                    name="genero"
                    value="masculino">

                <label for="masculino">Masculino</label>

                <br>

                <input
                    type="radio"
                    id="feminino"
                    name="genero"
                    value="feminino">

                <label for="feminino">Feminino</label>

                <br>

                <input
                    type="radio"
                    id="outro"
                    name="genero"
                    value="outro">

                <label for="outro">Outro</label>

                <br>

                <input
                    type="radio"
                    id="nao_informar"
                    name="genero"
                    value="prefiro_nao_informar">

                <label for="nao_informar">Prefiro não informar</label>

            </fieldset>

            <br>

            <input
                type="checkbox"
                id="aceite"
                name="aceite"
                value="sim"
                required>

            <label for="aceite">Aceito os termos de uso</label>

            <br><br>

            <button type="submit">Criar conta</button>

            <button type="reset">Limpar campos</button>

        </form>

    </main>
    <p>
        <a href="file:///C:/Users/Samuel%20Cireno/Documents/Cap%C3%ADtulo5-Formul%C3%A1rios-HTML.html">← Voltar à página principal</a>
    </p>


</body>
</html>
